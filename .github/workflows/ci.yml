name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      # Persist the SentenceTransformer model between runs so the sanctioned
      # one-time download (tests/conftest.py embed_model) is not re-fetched every
      # run — avoids HuggingFace rate-limiting (HTTP 429) the test suite.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-all-MiniLM-L6-v2

      - name: Run tests
        run: uv run pytest
